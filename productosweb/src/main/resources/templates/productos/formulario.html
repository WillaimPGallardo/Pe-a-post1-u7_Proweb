<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario</title>
</head>
<body>

<h1 th:text="${accion} + ' Producto'"></h1>

<form th:action="@{/productos/guardar}" method="post" th:object="${producto}">

    <input type="hidden" th:field="*{id}" />

    Nombre: <input type="text" th:field="*{nombre}" /><br>
    Descripción: <input type="text" th:field="*{descripcion}" /><br>
    Precio: <input type="number" step="0.01" th:field="*{precio}" /><br>

    <button type="submit">Guardar</button>

</form>

<a href="/productos">Volver</a>

</body>
</html>
